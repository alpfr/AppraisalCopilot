apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: appraisal-copilot
  labels:
    app: frontend
    app.kubernetes.io/part-of: appraisal-copilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        azure.workload/spot-tolerant: "true"
    spec:
      # Prefer spot nodes, but allow on-demand as fallback
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.azure.com/scalesetpriority
                    operator: In
                    values:
                      - spot
          # Spread across zones for availability
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: frontend
                topologyKey: topology.kubernetes.io/zone
      tolerations:
        - key: kubernetes.azure.com/scalesetpriority
          operator: Equal
          value: spot
          effect: NoSchedule
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: ACR_REGISTRY/appraisal-copilot-frontend:latest
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: VITE_API_URL
              value: "http://backend:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: appraisal-copilot
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
