apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: appraisal-copilot
  labels:
    app: backend
    app.kubernetes.io/part-of: appraisal-copilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        azure.workload/spot-tolerant: "true"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.azure.com/scalesetpriority
                    operator: In
                    values:
                      - spot
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: topology.kubernetes.io/zone
      tolerations:
        - key: kubernetes.azure.com/scalesetpriority
          operator: Equal
          value: spot
          effect: NoSchedule
      terminationGracePeriodSeconds: 45
      containers:
        - name: backend
          image: ACR_REGISTRY/appraisal-copilot-backend:latest
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appraisal-copilot-secrets
                  key: database-url
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcp/service-account.json
            - name: VERTEX_AI_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: appraisal-copilot-config
                  key: vertex-ai-project
            - name: VERTEX_AI_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: appraisal-copilot-config
                  key: vertex-ai-location
            - name: GCS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: appraisal-copilot-config
                  key: gcs-bucket
            - name: FAISS_INDEX_PATH
              value: /data/faiss
          volumeMounts:
            - name: faiss-data
              mountPath: /data/faiss
            - name: gcp-credentials
              mountPath: /secrets/gcp
              readOnly: true
      volumes:
        - name: faiss-data
          persistentVolumeClaim:
            claimName: faiss-pvc
        - name: gcp-credentials
          secret:
            secretName: gcp-service-account
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: appraisal-copilot
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
